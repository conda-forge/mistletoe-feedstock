{% set name = "mistletoe" %}
{% set version = "1.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mistletoe-{{ version }}.tar.gz
  sha256: 68b73be68bf8075ec882e035176d5c379d0d7f3401392c6f39c2cc9cd3264d44

build:
  entry_points:
    - mistletoe = mistletoe.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - mistletoe
  commands:
    - pip check
    - mistletoe --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/miyuchina/mistletoe
  summary: A fast, extensible Markdown parser in pure Python.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - domdfcoding
